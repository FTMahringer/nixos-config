# SOPS configuration - defines which keys can encrypt/decrypt secrets
# Generate a key first: ssh-to-age -i ~/.ssh/id_ed25519 > ~/.config/sops/age/keys.txt
# Or: age-keygen -o ~/.config/sops/age/keys.txt

keys:
  # Add your age public key here (age1...)
  # Get it from: age-keygen -y ~/.config/sops/age/keys.txt
  - &primary age175y0wkux6whd2qq6s43j2tgwusyh7pt0a30a3s7xjn0rfr8g2sxq439vqs

creation_rules:
  - path_regex: secrets/secrets\.yaml$
    key_groups:
      - age:
          - *primary
