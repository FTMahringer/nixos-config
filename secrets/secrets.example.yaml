# Example secrets file - copy to secrets.yaml and encrypt with sops
# Never commit unencrypted secrets to git!

# SSH private key (for git, remote access)
ssh_private_key: |
  -----BEGIN OPENSSH PRIVATE KEY-----
  ...
  -----END OPENSSH PRIVATE KEY-----

# API tokens
api_tokens:
  github: ghp_xxxxxxxxxxxxxxxxxxxx
  # Create at: https://github.com/settings/tokens/new
  # Needs: public_repo (or repo for private flakes)
  # This avoids GitHub API rate limits during 'nix flake update'

# Password hashes (generate with: mkpasswd -m sha-512)
passwords:
  fynn: $6$xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
